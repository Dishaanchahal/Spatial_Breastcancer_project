<svg viewBox="0 0 1000 985" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img">
<title>Spatial_GenAI breast-cancer spatial transcriptomics workflow</title>
<desc>Flowchart: Visium + scRNA reference to cell2location deconvolution, RCTD validation, downstream analyses (LIANA, niches/TLS, NMF microenvironments, PROGENy pathways), external and clinical validation, key results, and the biological conclusion.</desc>
<defs>
<marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#334155"/></marker>
</defs>
<rect x="0" y="0" width="1000" height="985" fill="#f8fafc"/>
<text x="500" y="40" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">Spatial_GenAI — Breast-Cancer Spatial Transcriptomics</text>
<text x="500" y="66" text-anchor="middle" font-size="15" fill="#475569">deconvolution → tissue architecture → cross-cohort clinical validation</text>
<line x1="500" y1="190" x2="500" y2="226" stroke="#334155" stroke-width="2.5" marker-end="url(#ah)"/>
<line x1="500" y1="318" x2="500" y2="360" stroke="#334155" stroke-width="2.5" marker-end="url(#ah)"/>
<line x1="500" y1="484" x2="500" y2="524" stroke="#334155" stroke-width="2.5" marker-end="url(#ah)"/>
<line x1="500" y1="616" x2="500" y2="652" stroke="#334155" stroke-width="2.5" marker-end="url(#ah)"/>
<line x1="500" y1="748" x2="500" y2="784" stroke="#334155" stroke-width="2.5" marker-end="url(#ah)"/>
<text x="24" y="98" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#2563eb">INPUT DATA</text>
<rect x="24" y="104" width="468" height="82" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="258" y="138" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">6 Visium slides</text>
<text x="258" y="163" text-anchor="middle" font-size="14" fill="#1e40af">4 TNBC · 2 ER+</text>
<rect x="508" y="104" width="468" height="82" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="742" y="138" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">scRNA-seq reference</text>
<text x="742" y="163" text-anchor="middle" font-size="14" fill="#1e40af">Wu 2021 · 100k cells · 9 cell types</text>
<text x="24" y="220" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#7c3aed">DECONVOLUTION + VALIDATION</text>
<rect x="24" y="226" width="468" height="82" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="258" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">cell2location (deep learning)</text>
<text x="258" y="285" text-anchor="middle" font-size="14" fill="#6d28d9">per-spot cell-type composition</text>
<rect x="508" y="226" width="468" height="82" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="742" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#5b21b6">RCTD cross-validation</text>
<text x="742" y="285" text-anchor="middle" font-size="14" fill="#6d28d9">Pearson r = 0.93</text>
<text x="24" y="354" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#0d9488">DOWNSTREAM ANALYSES</text>
<rect x="24" y="360" width="226" height="118" rx="12" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
<text x="137" y="392" text-anchor="middle" font-size="15.5" font-weight="700" fill="#115e59">Cell–cell comms</text>
<text x="137" y="414" text-anchor="middle" font-size="12.5" fill="#0f766e">LIANA</text>
<text x="137" y="440" text-anchor="middle" font-size="12.5" fill="#134e4a">CAF → CXCL12</text>
<text x="137" y="458" text-anchor="middle" font-size="12.5" fill="#134e4a">→ T / B cells</text>
<rect x="266" y="360" width="226" height="118" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
<text x="379" y="392" text-anchor="middle" font-size="15.5" font-weight="700" fill="#166534">Niches + TLS</text>
<text x="379" y="414" text-anchor="middle" font-size="12.5" fill="#15803d">Cabrita signature</text>
<text x="379" y="440" text-anchor="middle" font-size="12.5" fill="#14532d">lymphoid</text>
<text x="379" y="458" text-anchor="middle" font-size="12.5" fill="#14532d">aggregates</text>
<rect x="508" y="360" width="226" height="118" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
<text x="621" y="392" text-anchor="middle" font-size="15.5" font-weight="700" fill="#9d174d">NMF micro-</text>
<text x="621" y="410" text-anchor="middle" font-size="15.5" font-weight="700" fill="#9d174d">environments</text>
<text x="621" y="436" text-anchor="middle" font-size="12.5" fill="#be185d">6 co-occurring</text>
<text x="621" y="454" text-anchor="middle" font-size="12.5" fill="#be185d">communities</text>
<rect x="750" y="360" width="226" height="118" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
<text x="863" y="392" text-anchor="middle" font-size="15.5" font-weight="700" fill="#92400e">Pathway activity</text>
<text x="863" y="414" text-anchor="middle" font-size="12.5" fill="#b45309">PROGENy</text>
<text x="863" y="440" text-anchor="middle" font-size="12.5" fill="#78350f">JAK-STAT ↑ lymphoid</text>
<text x="863" y="458" text-anchor="middle" font-size="12.5" fill="#78350f">TGFβ ↑ CAF</text>
<text x="24" y="518" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#ea580c">EXTERNAL + CLINICAL VALIDATION</text>
<rect x="24" y="524" width="468" height="82" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
<text x="258" y="558" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">External replication</text>
<text x="258" y="583" text-anchor="middle" font-size="14" fill="#c2410c">independent 10x Visium (Block A)</text>
<rect x="508" y="524" width="468" height="82" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
<text x="742" y="558" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">Clinical survival</text>
<text x="742" y="583" text-anchor="middle" font-size="14" fill="#c2410c">TCGA n=1201 · METABRIC n=1903</text>
<rect x="24" y="652" width="952" height="96" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
<text x="500" y="680" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="1.5" fill="#a16207">KEY RESULT</text>
<text x="500" y="708" text-anchor="middle" font-size="17" font-weight="700" fill="#713f12">TLS → better survival:  METABRIC OS HR 0.87 (p = 3e-5) · TCGA recurrence significant</text>
<text x="500" y="732" text-anchor="middle" font-size="15" fill="#854d0e">TGFβ-rich CAF stroma → worse outcome (recurrence)</text>
<rect x="24" y="784" width="952" height="150" rx="14" fill="#0f172a"/>
<text x="500" y="816" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="2" fill="#38bdf8">BIOLOGICAL STORY</text>
<text x="500" y="852" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">CAFs secrete CXCL12 → recruit T &amp; B cells → organize into tertiary lymphoid</text>
<text x="500" y="878" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">structures (TLS) — a favorable-prognosis niche</text>
<text x="500" y="910" text-anchor="middle" font-size="15" fill="#94a3b8">…set within an immunosuppressive, TGFβ-rich CAF stroma (unfavorable)</text>
<text x="500" y="968" text-anchor="middle" font-size="12.5" fill="#64748b">Cross-validated by 2 methods, an independent dataset, and 2 survival cohorts · verified vs literature (23 refs) · reproducible on GitHub</text>
</svg>
